# Render Blueprint — deploy อัตโนมัติทุก git push
# โหมด demo (free): ข้อมูล + รูป ไม่ถาวร รีเซ็ตตอน redeploy/sleep
# อยากถาวร: plan starter + เพิ่ม block disk + env DB_PATH=/var/data/inventory.db (ดู git history commit ก่อน)
services:
  - type: web
    name: lab-inventory
    runtime: node
    plan: free
    buildCommand: npm install && npm --prefix client install && npm --prefix client run build
    startCommand: node scripts/init-db.js && node server.js
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 24.16.0
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USER
        value: admin
      # ADMIN_PASS: ไม่ตั้ง = ใช้ default admin1234 จาก init-db
