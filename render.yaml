# Render Blueprint — deploy อัตโนมัติทุก git push
# ข้อมูลถาวรผ่าน Turso: ตั้ง env TURSO_URL + TURSO_TOKEN (ในหน้า Render dashboard)
#   ไม่ตั้ง = ข้อมูลรีเซ็ตทุก redeploy (demo)
#   ตั้งแล้ว = ถาวรบน Turso cloud ข้าม redeploy (รูปยังหาย เพราะเก็บใน uploads/ บน disk ephemeral)
services:
  - type: web
    name: lab-inventory
    runtime: node
    plan: free
    buildCommand: npm install && npm --prefix client install && npm --prefix client run build
    startCommand: node scripts/init-db.js && node server.js
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 24.16.0
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USER
        value: admin
      # ADMIN_PASS: ไม่ตั้ง = ใช้ default admin1234 จาก init-db
      # กรอกค่าจริง 2 ตัวนี้ในหน้า Render dashboard เพื่อเปิดโหมดถาวร (Turso)
      - key: TURSO_URL
        sync: false
      - key: TURSO_TOKEN
        sync: false
